name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    # Ibis's deployment target is macOS 26 (Tahoe), so the tests can only *run*
    # on a macOS 26+ runner (the test-host app's minimum-OS won't launch on an
    # older OS). Pin the image rather than using `macos-latest`, which can lag.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Use the newest non-beta Xcode on the runner (GitHub images don't carry
      # betas). Building with a newer SDK against the macOS 26 deployment target
      # is fine — availability is enforced against the target, not the SDK.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show toolchain
        run: xcodebuild -version

      # Resolve SPM dependencies up front (uses the committed Package.resolved).
      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project ibis.xcodeproj -scheme ibis

      - name: Run tests
        run: |
          set -o pipefail
          # -skipMacroValidation: SwiftMCP/JSONFoundation ship macro targets, and
          # a fresh runner has never "trusted" them (no one can click the Xcode
          # dialog here), so without it the build fails with "Macro … must be
          # enabled before it can be used".
          xcodebuild test \
            -project ibis.xcodeproj \
            -scheme ibis \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      # Keep the result bundle for inspection when a run fails.
      - name: Upload test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
